# yaml-language-server: $schema=https://agentgateway.dev/schema/config
# ProofRail Composed Bronze Demo 001 — normal mode
# Validate against the installed agentgateway version before relying on this file.

# Prefer simplified MCP format from agentgateway docs.
mcp:
  port: 3000
  targets:
    - name: proofrail-mock-actuators
      mcp:
        host: http://mock-mcp:3005/mcp/
  policies:
    localRateLimit:
     - maxTokens: 5 
       tokensPerFill: 1
       fillInterval: 60s
       type: requests
